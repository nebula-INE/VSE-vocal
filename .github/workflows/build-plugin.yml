name: Build JUCE Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Plugin on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- Linux 固有の依存関係インストール ---
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev ladspa-sdk libcurl4-openssl-dev libfreetype6-dev libx11-dev libxext-dev libxinerama-dev libxrandr-dev libxcursor-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev libgl1-mesa-dev
      # --- ビルド設定 (Configure) ---
      # 存在しない juce_plugin パスを排除し、ルートを起点に1行で処理します
      # --- ビルド設定 (Configure) ---
      # macOSの場合のみ、リンカーに直接 -liconv を注入するフラグを渡します
      - name: Configure CMake
        run: |
          if [ "${{ matrix.os }}" == "macos-14" ]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DPROJECT_VERSION=1.0.0 -DCMAKE_SHARED_LINKER_FLAGS="-liconv" -DCMAKE_EXE_LINKER_FLAGS="-liconv"
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DPROJECT_VERSION=1.0.0
          fi
        shell: bash
      # --- ビルド実行 (Build) ---
      - name: Build Plugin
        run: cmake --build build --config Release --parallel 4

      # --- 成果物のアップロード (Artifacts) ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vose-plugin-${{ matrix.os }}
          path: |
            build/**/*_artefacts/Release/VST3/
            build/**/*_artefacts/Release/AU/
            build/**/*_artefacts/Release/Standalone/
          if-no-files-found: warn
