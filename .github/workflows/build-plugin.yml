name: Build JUCE Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Plugin on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest から macos-14 に変更します
        os: [windows-latest, macos-14, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- Linux 固有の依存関係インストール ---
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxcursor-dev \
            libwebkit2gtk-4.0-dev \
            glu-dev \
            libgl1-mesa-dev

      # --- ビルド設定 (Configure) ---
      # -S でソースのある juce_plugin を明示し、その中に build ディレクトリを作ります
      - name: Configure CMake
        run: |
          cmake -S juce_plugin -B juce_plugin/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROJECT_VERSION=1.0.0

      # --- ビルド実行 (Build) ---
      # ビルド対象のディレクトリも juce_plugin/build に合わせます
      - name: Build Plugin
        run: |
          cmake --build juce_plugin/build --config Release --parallel 4

      # --- 成果物のアップロード (Artifacts) ---
      # アップロード元パスも変更します
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vose-plugin-${{ matrix.os }}
          path: |
            juce_plugin/build/**/*_artefacts/Release/VST3/
            juce_plugin/build/**/*_artefacts/Release/AU/
            juce_plugin/build/**/*_artefacts/Release/Standalone/
          if-no-files-found: warn
