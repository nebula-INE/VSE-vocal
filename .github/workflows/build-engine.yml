name: "🎙️ VO-SE Pro: Official Engine Builder (Integrated)"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: "🛠️ Build & Pack on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # [FIX-CI-ACTIONS] actions/checkout@v6 / setup-python@v6 は存在しない。
        # 2026年6月現在の最新安定版 v4 に統一。
        os: [windows-latest, macos-latest, ubuntu-latest]


    steps:
      - name: "📂 [Step 1] Checkout Repository"
        uses: actions/checkout@v4

      - name: "🐍 [Step 2] Setup Python Environment"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: "🧩 [Step 3] Install OS Dependencies (Linux)"
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-cursor0 libxrender1 libxi6 \
            libsm6 libxext6 libfontconfig1 \
            libpulse0 libasound2t64 libsndfile1 portaudio19-dev

      - name: "🧩 [Step 3] Install OS Dependencies (macOS)"
        if: runner.os == 'macOS'
        run: brew install portaudio libsndfile

      - name: "📦 [Step 4] Install Python Dependencies"
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip wheel setuptools

          # --- 事前ビルド版を先に入れて pyopenjtalk のソースビルドを回避 ---
          # macOS / Linux 両方で有効。Windows でも問題なければ同様に入れてOK。
          python -m pip install --upgrade pyopenjtalk-prebuilt || true

          # requirements をインストール（prebuilt があればそちらが優先されます）
          python -m pip install -r requirements.txt

          # 必要ランタイム（任意で追加）
          python -m pip install Pillow PySide6 sounddevice soundfile || true

          # デバッグ出力
          python - <<'PY' || true
          import importlib, sys, subprocess
          def show(pkg):
              try:
                  m = importlib.import_module(pkg)
                  print(f"OK: {pkg} ->", getattr(m, "__version__", "version-unknown"))
              except Exception as e:
                  print(f"MISS: {pkg} -> {e}")
          for p in ("pyopenjtalk","pyopenjtalk_prebuilt","cmake"):
              show(p)
          subprocess.run(["cmake","--version"], check=False)
          PY


      - name: "📂 [Step 5] Prepare Directory"
        shell: bash
        run: mkdir -p bin src assets dist_out

      - name: "🎙️ [Step 6] Pack Official Voice Data"
        run: python modules/tools/pack_all_voices.py

      - name: "🔍 Verify bin contents"
        shell: bash
        run: |
          echo "=== bin/ の中身 ==="
          ls -la bin/ 2>/dev/null || echo "bin/ が存在しません"

      - name: "🔧 Setup MSVC (Windows only)"
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: "🏗️ [Step 7] Compile Engine"
        shell: bash
        run: |
          cp include/world/*.h src/world/
          cp include/*.h src/

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cmd //c "cl.exe /std:c++17 /EHsc /O2 /LD /D_USE_MATH_DEFINES \
              /Fe:bin\\vose_core.dll \
              src\\vose_core.cpp \
              src\\world\\cheaptrick.cpp \
              src\\world\\common.cpp \
              src\\world\\d4c.cpp \
              src\\world\\dio.cpp \
              src\\world\\fft.cpp \
              src\\world\\harvest.cpp \
              src\\world\\matlabfunctions.cpp \
              src\\world\\stonemask.cpp \
              src\\world\\synthesis.cpp \
              src\\world\\audioio.cpp \
              /I src /I include /I src\\world \
              /link"

          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            mkdir -p build/macos-world
            for f in src/world/*.cpp; do
              [ -e "$f" ] || continue
              obj="build/macos-world/$(basename "${f%.cpp}").o"
              clang++ -O3 -fPIC -ffast-math -c -std=c++17 -stdlib=libc++ -mmacosx-version-min=11.0 \
                -D_USE_MATH_DEFINES \
                -I./src -I./include -I./src/world \
                "$f" -o "$obj"
            done

            clang++ -O3 -dynamiclib -std=c++17 -stdlib=libc++ \
              -mmacosx-version-min=11.0 \
              -I./src -I./include -I./src/world \
              -o bin/libvose_core.dylib \
              src/vose_core.cpp \
              build/macos-world/*.o
          else
            mkdir -p build/linux-world
            for f in src/world/*.cpp; do
              [ -e "$f" ] || continue
              obj="build/linux-world/$(basename "${f%.cpp}").o"
              g++ -O3 -fPIC -ffast-math -c -std=c++17 \
                -D_USE_MATH_DEFINES \
                -I./src -I./include -I./src/world \
                "$f" -o "$obj"
            done

            g++ -O3 -fPIC -shared -std=c++17 \
              -Wl,-soname,libvose_core.so \
              -I./src -I./include -I./src/world \
              -o bin/libvose_core.so \
              src/vose_core.cpp \
              build/linux-world/*.o
          fi
          
      - name: "🔍 Verify DLL/dylib"
        shell: bash
        run: ls -la bin/

      - name: "📦 [Step 8] Package Integrated Executable (PyInstaller)"
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --noconsole --onefile \
              --add-data "bin/vose_core.dll;bin" \
              --add-data "assets;assets" \
              --distpath ./dist_out --name "VO-SE_PRO_Win" main.py
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            pyinstaller --noconsole --windowed \
              --add-data "bin/libvose_core.dylib:bin" \
              --add-data "assets:assets" \
              --distpath ./dist_out --name "VO-SE_PRO_Mac" main.py
            cd dist_out && zip -r VO-SE_PRO_Mac.zip VO-SE_PRO_Mac.app && cd ..
           else
            pyinstaller --noconsole --onefile \
              --add-data "bin/libvose_core.so:bin" \
              --add-data "assets:assets" \
              --distpath ./dist_out --name "VO-SE_PRO_Linux" main.py
            chmod +x dist_out/VO-SE_PRO_Linux
          fi

      - name: "🔍 Debug: List files before release"
        shell: bash
        run: |
          echo "--- dist_out content ---"
          find dist_out -maxdepth 2
          echo "--- bin content ---"
          find bin -maxdepth 2 -type f -print

      - name: "📦 Upload Artifacts for Workflow"
        uses: actions/upload-artifact@v4
        with:
          name: VO-SE-Build-${{ matrix.os }}
          path: |
            dist_out/*
            bin/*.dll
            bin/*.dylib
            bin/*.so

      - name: "🚀 [Step 9] Publish GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "VO-SE PRO (Official Edition)"
          files: |
            ${{ matrix.os == 'windows-latest' && 'dist_out/VO-SE_PRO_Win.exe' || '' }}
            ${{ matrix.os == 'windows-latest' && 'bin/*.dll' || '' }}
            ${{ matrix.os == 'macos-latest' && 'dist_out/VO-SE_PRO_Mac.zip' || '' }}
            ${{ matrix.os == 'macos-latest' && 'bin/*.dylib' || '' }}
            ${{ matrix.os == 'ubuntu-latest' && 'dist_out/VO-SE_PRO_Linux' || '' }}
            ${{ matrix.os == 'ubuntu-latest' && 'bin/*.so' || '' }}
          fail_on_unmatched_files: false
          generate_release_notes: true
          make_latest: true
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
