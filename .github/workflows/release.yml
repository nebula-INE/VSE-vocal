# .github/workflows/release.yml
#
# [フェーズ3 統合版]
# 既存のPython/PySide6版アプリ（PyInstaller、詳細ビルド/署名/公証/DMG作成込み）と
# 新しいJUCEプラグイン（VST3/AU/Standalone）を同時にビルド・パッケージング・テストする
# 統合ワークフロー。
#
# ジョブの実行順序:
#   1. build              — Python/PySide6版アプリをPyInstallerでパッケージ（署名/notarize/DMG込み）
#   2. build-juce-plugin  — JUCEプラグインをCMakeでビルド + コード署名/公証
#   3. test-juce-plugin   — ビルド成果物の基本的なプラグイン検証テスト
#   4. smoke-linux        — 既存のLinux GUI依存パッケージ確認

name: "🚀 Release VO-SE vocal (Official Edition)"
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # =============================================================================
  # 1. Python/PySide6 版アプリ ビルド（PyInstaller / 署名 / notarize / DMG）
  # =============================================================================
  build:
    name: Build Python/PySide6 for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-15-intel, macos-15, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      # 1. 依存関係を先にインストール（最重要）
      - name: Install build tools (macOS / Linux)
        if: startsWith(matrix.os, 'macos') || matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == macos* ]]; then
            brew update
            # CMake と OpenJTalk/HTS/libsndfile を入れてソースビルドに備える
            brew install cmake libsndfile portaudio open-jtalk || true
          else
            sudo apt-get update
            # cmake と OpenJTalk/HTS 系の dev パッケージをインストール
            sudo apt-get install -y cmake libsndfile1-dev portaudio19-dev libopenjtalk-dev || true
          fi

      - name: Install dependencies
        if: startsWith(matrix.os, 'macos') || matrix.os == 'ubuntu-latest' || matrix.os == 'windows-latest'
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
          QT_MEDIA_BACKEND: ffmpeg
        run: |
          set -euo pipefail

          # pip ツール更新
          python -m pip install --upgrade pip wheel setuptools

          # --- Linux runner では最新の cmake / build tools を入れておく（任意保険） ---
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update
            sudo apt-get install -y build-essential cmake pkg-config git \
              libsndfile1-dev portaudio19-dev libopenjtalk-dev swig || true
          fi

          # --- 事前ビルド済パッケージを先に入れて pyopenjtalk のソースビルドを回避 ---
          if [[ "${{ matrix.os }}" == macos* ]] || [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            python -m pip install --upgrade pyopenjtalk-prebuilt || true
          fi

          # requirements をインストール（prebuilt があればそちらが優先されます）
          python -m pip install -r requirements.txt || true

          # 起動に必要なランタイム類を確実に入れる
          python -m pip install Pillow PySide6 sounddevice soundfile || true

          # その他ツール類
          python -m pip install "setuptools<82" pytest ruff pyright python-rtmidi mido pyinstaller || true

          # デバッグ: インストール確認（CIログに出ます）
          python - <<'PY' || true
          import importlib, sys
          def show(pkg):
              try:
                  m = importlib.import_module(pkg)
                  print(f"OK: {pkg} ->", getattr(m, "__version__", "version-unknown"))
              except Exception as e:
                  print(f"MISS: {pkg} -> {e}")
          for p in ("pyopenjtalk","pyopenjtalk_prebuilt","PySide6","sounddevice","soundfile","PIL"):
              show(p)
          import subprocess
          try:
              subprocess.run(["cmake","--version"], check=False)
          except Exception as e:
              print("cmake check failed:", e)
          PY

      - name: Set UTF-8 encoding (Windows only)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          chcp 65001
          setx PYTHONUTF8 1

      # 2. OS依存ライブラリを入れる
      - name: Install OS dependencies
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            choco install libsndfile -y
          elif [ "${{ runner.os }}" == "macOS" ]; then
            brew install portaudio libsndfile
          elif [ "${{ runner.os }}" == "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y \
              libgl1 libegl1 libxkbcommon0 libxkbcommon-x11-0 \
              libdbus-1-3 libxcb-cursor0 libxrender1 libxi6 \
              libsm6 libxext6 libfontconfig1 \
              libpulse0 libasound2t64 libsndfile1 portaudio19-dev
          fi

      - name: Ruff Check and Fix (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: ruff check . --select E,F --ignore E501,E401 --fix --exit-zero

      - name: 🔍 audioio.h を探す
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: find . -name "audioio.h" | sort

      - name: 🎙️ Generate Voice Data Header
        shell: bash
        run: |
          python modules/tools/pack_all_voices.py

      - name: Auto Commit Fixes
        if: matrix.os == 'windows-latest'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: ruff auto-fix unused imports"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      - name: 🛠️ Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: 🛠️ Build VOSE Core (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          if not exist bin mkdir bin
          copy include\world\*.h src\world\

          :: WORLDのソースを先にコンパイルしてオブジェクトファイルを作る
          cl.exe /std:c++17 /EHsc /O2 /D_USE_MATH_DEFINES ^
            /I src /I include /I src\world ^
            /c src\world\*.cpp

          :: vose_core.cpp と WORLDのオブジェクトをまとめてDLLにリンク
          cl.exe /std:c++17 /EHsc /O2 /LD /D_USE_MATH_DEFINES ^
            /Fe:bin\vose_core.dll ^
            src\vose_core.cpp *.obj ^
            /I src /I include /I src\world ^
            /link

      - name: 🛠️ Build VOSE Core (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          mkdir -p bin
          cp include/world/*.h src/world/
          cd src/world

          echo "🔨 Compiling WORLD source files..."
          for f in *.cpp; do
            [ -e "$f" ] || continue
            echo "  Compiling $f..."
            clang++ -O3 -c -std=c++17 -stdlib=libc++ -mmacosx-version-min=11.0 \
              -arch x86_64 -arch arm64 \
              -I. -I.. -I../../include \
              "$f"
          done

          for f in *.c; do
            [ -e "$f" ] || continue
            echo "  Compiling $f..."
            clang -O3 -c -mmacosx-version-min=11.0 \
              -arch x86_64 -arch arm64 \
              -I. -I.. -I../../include \
              "$f"
          done

          cd ../..

          echo "🔗 Linking all objects into libvose_core.dylib..."
          clang++ -O3 -dynamiclib -std=c++17 -stdlib=libc++ \
            -mmacosx-version-min=11.0 \
            -arch x86_64 -arch arm64 \
            -I./src \
            -I./include \
            -I./src/world \
            -o bin/libvose_core.dylib \
            src/vose_core.cpp \
            src/world/*.o

          echo "✅ Build Complete: bin/libvose_core.dylib"
          ls -l bin/libvose_core.dylib

      - name: 🛠️ Build VOSE Core (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bin build/linux-world
          cp include/world/*.h src/world/

          echo "🔨 Compiling WORLD source files for Linux..."
          for f in src/world/*.cpp; do
            [ -e "$f" ] || continue
            obj="build/linux-world/$(basename "${f%.cpp}").o"
            echo "  Compiling $f -> $obj"
            g++ -O3 -fPIC -c -std=c++17 \
              -D_USE_MATH_DEFINES \
              -I./src -I./include -I./src/world \
              "$f" -o "$obj"
          done

          echo "🔗 Linking all objects into libvose_core.so..."
          g++ -O3 -fPIC -shared -std=c++17 \
            -Wl,-soname,libvose_core.so \
            -I./src -I./include -I./src/world \
            -o bin/libvose_core.so \
            src/vose_core.cpp \
            build/linux-world/*.o

          echo "✅ Build Complete: bin/libvose_core.so"
          ls -l bin/libvose_core.so

      - name: Package with PyInstaller
        shell: bash
        run: |
          # OSに応じた正確なファイル名とパス設定
          if [ "${{ runner.os }}" == "Windows" ]; then
            ICON="assets/icon.ico"
            CORE_LIB="bin/vose_core.dll;bin"
            PATH_SEP=";"
            NAME="VO-SE_vocal_Win"
          elif [ "${{ runner.os }}" == "macOS" ]; then
            ICON="assets/icon.icns"
            CORE_LIB="bin/libvose_core.dylib:bin"
            PATH_SEP=":"
            NAME="VO-SE_vocal_Mac"
          else
            ICON="assets/icon.ico"
            CORE_LIB="bin/libvose_core.so:bin"
            PATH_SEP=":"
            NAME="VO-SE_vocal_Linux"
          fi

          # PyInstallerの実行（main.pyから直接自動生成）
          # 注意: macOS の .app バンドルを作る場合は onedir を推奨（--onefile と .app は非推奨）
          python -m PyInstaller --noconsole --onefile --clean \
            --paths . \
            --paths modules \
            --icon="$ICON" \
            --collect-all=PySide6 \
            --hidden-import=modules.gui.main_window \
            --hidden-import=backports \
            --hidden-import=backports.tarfile \
            --collect-all=sounddevice \
            --collect-all=soundfile \
            --add-data "$CORE_LIB" \
            --add-data "assets${PATH_SEP}assets" \
            --add-data "modules${PATH_SEP}modules" \
            --name "$NAME" main.py

      - name: Verify pkg_resources for PyInstaller hook
        shell: python
        run: |
          import pkg_resources
          print("pkg_resources file:", getattr(pkg_resources, "__file__", "unknown"))
          print("has NullProvider:", hasattr(pkg_resources, "NullProvider"))
          if not hasattr(pkg_resources, "NullProvider"):
              raise SystemExit("pkg_resources.NullProvider is missing")

      - name: Generate macOS entitlements plist
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          cat > macos-entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.disable-library-validation</key>
            <true/>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
            <key>com.apple.security.device.audio-input</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Create User Dictionary (if needed)
        shell: python
        run: |
          import os
          try:
              import pyopenjtalk
              if hasattr(pyopenjtalk, 'create_user_dict') and os.path.exists('user.csv'):
                  pyopenjtalk.create_user_dict('user.dic', 'user.csv')
                  print('User dictionary created successfully.')
              else:
                  print('Skip dict creation: No user.csv or function missing')
          except Exception as e:
              print(f'Skip dict creation: {e}')

      # ── ① バージョンをソースに埋め込む ──────────────────────────
      - name: Inject version into update_checker.py
        shell: bash
        env:
          RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.0-dev' }}
        run: |
          echo "Injecting version: $RELEASE_VERSION"

          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"].removeprefix("v")
          checker = Path("modules/updater/update_checker.py")
          checker.parent.mkdir(parents=True, exist_ok=True)

          if checker.exists():
              text = checker.read_text(encoding="utf-8")
              text = re.sub(
                  r'^CURRENT_VERSION = .*$',
                  f'CURRENT_VERSION = "{version}"',
                  text,
                  count=1,
                  flags=re.MULTILINE,
              )
              if 'CURRENT_VERSION = ' not in text:
                  text = f'CURRENT_VERSION = "{version}"\n' + text
          else:
              text = (
                  'import json, threading, urllib.request\n'
                  'from packaging.version import Version\n\n'
                  f'CURRENT_VERSION = "{version}"\n'
                  'GITHUB_API_URL = "https://api.github.com/repos/YOUR_ORG/VO-SE-vocal/releases/latest"\n\n'
                  'class UpdateChecker:\n'
                  '    def check_async(self, callback):\n'
                  '        threading.Thread(target=self._check, args=(callback,), daemon=True).start()\n\n'
                  '    def _check(self, callback):\n'
                  '        try:\n'
                  '            req = urllib.request.Request(GITHUB_API_URL, headers={"User-Agent": "VO-SE-vocal"})\n'
                  '            with urllib.request.urlopen(req, timeout=5) as res:\n'
                  '                data = json.loads(res.read())\n'
                  '            latest = data["tag_name"].lstrip("v")\n'
                  '            page_url = data["html_url"]\n'
                  '            assets = data.get("assets", [])\n'
                  '            exe_url = next((a["browser_download_url"] for a in assets if a["name"].endswith("_update.zip") or a["name"].endswith(".exe")), None)\n'
                  '            if Version(latest) > Version(CURRENT_VERSION):\n'
                  '                callback(True, latest, page_url, exe_url)\n'
                  '            else:\n'
                  '                callback(False, latest, None, None)\n'
                  '        except Exception:\n'
                  '            callback(None, None, None, None)\n'
              )

          checker.write_text(text, encoding="utf-8")
          PY
          echo "Done. CURRENT_VERSION is now ${RELEASE_VERSION#v}"

      - name: Lint with Ruff
        shell: bash
        run: |
          ruff check . --select E,F --ignore E501,E401 --fix --exit-zero

      - name: Type Check with Pyright
        shell: bash
        run: |
          pyright .

      - name: Pack Official Voice Data
        shell: bash
        run: |
          # 1. 括弧のスペースを修正してスクリプトを検索
          TARGET_SCRIPT=$(find . \( -name "pack_voice.py" -o -name "pack_all_voices.py" \) -type f | head -n 1)

          if [ -n "$TARGET_SCRIPT" ]; then
            echo "Found script: $TARGET_SCRIPT"

            # 2. ディレクトリ移動のトラブルを防ぐため、絶対パスを取得
            ABS_SCRIPT_PATH=$(pwd)/${TARGET_SCRIPT#./}
            SCRIPT_DIR=$(dirname "$ABS_SCRIPT_PATH")
            SCRIPT_NAME=$(basename "$ABS_SCRIPT_PATH")

            # 3. ディレクトリを移動して実行（pushd / popd の方が安全）
            pushd "$SCRIPT_DIR" > /dev/null
            python "$SCRIPT_NAME"
            popd > /dev/null
          else
            echo "Error: Packing script not found."
            exit 1
          fi

      - name: Package App
        shell: bash
        run: |
          rm -rf dist build dist_out
          mkdir dist_out
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --noconsole --onefile --clean \
              --paths modules \
              --icon="assets/icon.ico" \
              --hidden-import=modules.gui.main_window \
              --hidden-import=rtmidi \
              --hidden-import=mido.backends.rtmidi \
              --hidden-import=backports \
              --hidden-import=backports.tarfile \
              --collect-all=sounddevice \
              --collect-all=soundfile \
              --collect-all=pyopenjtalk \
              --add-data "bin/vose_core.dll;bin" \
              --add-data "assets;assets" \
              --add-data "modules;modules" \
              --name "VO-SE_vocal_Win" main.py
            cp dist/VO-SE_vocal_Win.exe dist_out/
          elif [ "${{ runner.os }}" = "Linux" ]; then
            echo "Building Linux app on runner: ${{ matrix.os }}"
            pyinstaller --noconsole --onefile --clean \
              --paths modules \
              --icon="assets/icon.ico" \
              --hidden-import=modules.gui.main_window \
              --hidden-import=rtmidi \
              --hidden-import=mido.backends.rtmidi \
              --hidden-import=backports \
              --hidden-import=backports.tarfile \
              --collect-all=sounddevice \
              --collect-all=soundfile \
              --collect-all=pyopenjtalk \
              --add-data "bin/libvose_core.so:bin" \
              --add-data "assets:assets" \
              --add-data "modules:modules" \
              --name "VO-SE_vocal_Linux" main.py
            chmod +x dist/VO-SE_vocal_Linux
            cp dist/VO-SE_vocal_Linux dist_out/VO-SE_vocal_Linux_x86_64
          else
            echo "Building macOS app on runner: ${{ matrix.os }}"
            if [ "${{ matrix.os }}" = "macos-15-intel" ]; then
              MAC_ARCH="x86_64"
              MAC_LABEL="Intel"
            else
              MAC_ARCH="arm64"
              MAC_LABEL="AppleSilicon"
            fi

            # macOS は onedir を推奨。PySide6 の不要モジュールを明示的に除外して symlink 衝突を防ぐ
            pyinstaller --noconsole --windowed --clean --onedir \
              --target-arch "$MAC_ARCH" \
              --paths modules \
              --icon="assets/icon.icns" \
              --hidden-import=modules.gui.main_window \
              --hidden-import=rtmidi \
              --hidden-import=mido.backends.rtmidi \
              --hidden-import=backports \
              --hidden-import=backports.tarfile \
              --collect-all=sounddevice \
              --collect-all=soundfile \
              --collect-all=pyopenjtalk \
              --add-data "bin/libvose_core.dylib:bin" \
              --add-data "assets:assets" \
              --add-data "modules:modules" \
              --exclude-module PySide6.Qt3DAnimation \
              --exclude-module PySide6.Qt3DCore \
              --exclude-module PySide6.Qt3DExtras \
              --exclude-module PySide6.Qt3DInput \
              --exclude-module PySide6.Qt3DLogic \
              --exclude-module PySide6.Qt3DRender \
              --exclude-module PySide6.QtCharts \
              --exclude-module PySide6.QtDataVisualization \
              --exclude-module PySide6.QtDesigner \
              --exclude-module PySide6.QtGraphs \
              --exclude-module PySide6.QtHelp \
              --exclude-module PySide6.QtLocation \
              --exclude-module PySide6.QtNfc \
              --exclude-module PySide6.QtPdf \
              --exclude-module PySide6.QtPdfWidgets \
              --exclude-module PySide6.QtPositioning \
              --exclude-module PySide6.QtQuick3D \
              --exclude-module PySide6.QtQuickControls2 \
              --exclude-module PySide6.QtRemoteObjects \
              --exclude-module PySide6.QtScxml \
              --exclude-module PySide6.QtSensors \
              --exclude-module PySide6.QtSerialBus \
              --exclude-module PySide6.QtSerialPort \
              --exclude-module PySide6.QtSpatialAudio \
              --exclude-module PySide6.QtWebEngineCore \
              --exclude-module PySide6.QtWebEngineQuick \
              --exclude-module PySide6.QtWebEngineWidgets \
              --exclude-module PySide6.QtWebSockets \
              --exclude-module PySide6.QtWebView \
              --name "VO-SE_vocal_Mac" main.py

            # 実行ビット付与（onedir の場合の実行ファイル）
            chmod +x dist/VO-SE_vocal_Mac.app/Contents/MacOS/VO-SE_vocal_Mac || true

            echo "macOS app bundle is ready for signing before packaging."
          fi

      - name: 🧹 Clean PySide6 Frameworks (macOS only)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          APP="dist/VO-SE_vocal_Mac.app"
          if [ -d "$APP" ]; then
            echo "Cleaning PySide6/Qt extras from $APP"
            rm -rf "$APP/Contents/Frameworks/PySide6/Assistant.app" || true
            rm -rf "$APP/Contents/Frameworks/PySide6/Designer.app" || true
            rm -rf "$APP/Contents/Frameworks/Qt/libexec" || true
            rm -rf "$APP/Contents/Frameworks/Qt/examples" || true
            rm -rf "$APP/Contents/Frameworks/Qt/tests" || true
            # 不要なプラグイン（必要に応じて追加/削除）
            rm -rf "$APP/Contents/Frameworks/Qt/plugins/printsupport" || true
            rm -rf "$APP/Contents/Frameworks/Qt/plugins/sqldrivers" || true
            rm -rf "$APP/Contents/Frameworks/Qt/plugins/virtualkeyboard" || true
            # Python メタデータ
            find "$APP/Contents/Frameworks" -maxdepth 2 -name "*.dist-info" -exec rm -rf {} + || true
            find "$APP/Contents/Frameworks" -maxdepth 2 -name "*.egg-info" -exec rm -rf {} + || true
            echo "Cleanup done."
          else
            echo "No app bundle found at $APP; skipping cleanup."
          fi

      - name: Verify macOS binary linkage
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          APP_BIN="dist/VO-SE_vocal_Mac.app/Contents/MacOS/VO-SE_vocal_Mac"
          test -f "$APP_BIN"
          chmod +x "$APP_BIN"
          echo "== otool main binary =="
          otool -L "$APP_BIN"
          echo "== verify bundled vose core =="
          find dist -name "libvose_core.dylib" -type f

      - name: Clean App Bundle Frameworks
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          APP="dist/VO-SE_vocal_Mac.app"
          if [ -d "$APP" ]; then
            echo "Removing obvious metadata and heavy extras"
            find "$APP/Contents/Frameworks" -maxdepth 2 -name "*.dist-info" -exec rm -rf {} + || true
            find "$APP/Contents/Frameworks" -maxdepth 2 -name "*.egg-info" -exec rm -rf {} + || true
            rm -rf "$APP/Contents/Frameworks/Qt/libexec" || true
            rm -rf "$APP/Contents/Frameworks/Qt/examples" || true
            rm -rf "$APP/Contents/Frameworks/PySide6/Assistant__dot__app" || true
            rm -rf "$APP/Contents/Frameworks/PySide6/Designer__dot__app" || true
          else
            echo "No app bundle found at $APP; skipping cleanup."
          fi

      - name: 🍎 Verify and Fix macOS Library Linkage Safe
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail

          APP_BUNDLE="dist/VO-SE_vocal_Mac.app"
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "Error: app bundle not found at $APP_BUNDLE"
            exit 0
          fi

          echo "== Quick symlink summary =="
          find "$APP_BUNDLE" -type l | head -n 50 || true
          echo "Total symlinks:" $(find "$APP_BUNDLE" -type l | wc -l)

          # Materialize only problematic framework 'Versions/Current' symlinks to avoid collisions
          echo "== Materializing framework 'Versions/Current' symlinks (safe) =="
          find "$APP_BUNDLE/Contents/Frameworks" -type l -name "Current" -print | while read -r link; do
            [ -z "$link" ] && continue
            target=$(readlink "$link" || true)
            [ -z "$target" ] && continue
            # convert relative to absolute if needed
            if [ "${target#/}" = "$target" ]; then
              target="$(dirname "$link")/$target"
            fi
            echo "Materializing: $link -> $target"
            tmp="${link}.tmp"
            mkdir -p "$(dirname "$link")"
            if [ -d "$target" ]; then
              cp -R -L "$target" "$tmp"
            else
              cp -L "$target" "$tmp"
            fi
            rm -f "$link"
            mv "$tmp" "$link"
          done

          # Remove nested PySide6 apps and other nested .app that break codesign
          rm -rf "$APP_BUNDLE/Contents/Frameworks/PySide6/Assistant__dot__app" || true
          rm -rf "$APP_BUNDLE/Contents/Frameworks/PySide6/Designer__dot__app" || true

          # Locate main binary
          APP_BIN=$(find "$APP_BUNDLE" -type f -path "*/Contents/MacOS/VO-SE_vocal_Mac" -print -quit)
          if [ -z "$APP_BIN" ]; then
            APP_BIN=$(find "$APP_BUNDLE" -type f -name "VO-SE_vocal_Mac" -print -quit)
          fi
          if [ -z "$APP_BIN" ]; then
            echo "Error: APP_BIN not found in $APP_BUNDLE"
            exit 1
          fi
          echo "Found APP_BIN: $APP_BIN"
          chmod +x "$APP_BIN"

          # Fix install_name for bundled libvose_core.dylib if present and sign each dylib
          find "$APP_BUNDLE" -name "libvose_core.dylib" -type f | while read -r DYLIB_BIN; do
            echo "Processing dylib: $DYLIB_BIN"
            chmod 755 "$DYLIB_BIN"
            LIB_NAME=$(basename "$DYLIB_BIN")
            install_name_tool -id "@loader_path/$LIB_NAME" "$DYLIB_BIN" || true
            OLD_REF=$(otool -L "$APP_BIN" | grep "libvose_core" | awk '{print $1}' || true)
            if [ -n "$OLD_REF" ]; then
              echo "Changing reference in app from $OLD_REF to @executable_path/../Frameworks/bin/$LIB_NAME"
              install_name_tool -change "$OLD_REF" "@executable_path/../Frameworks/bin/$LIB_NAME" "$APP_BIN" || true
            fi
            codesign --force --sign - "$DYLIB_BIN" || true
          done

          # Sign individual binaries first, then the app bundle
          echo "Signing internal binaries..."
          find "$APP_BUNDLE" -type f \( -name "*.dylib" -o -name "*.so" -o -name "VO-SE_vocal_Mac" \) -print | while read -r f; do
            codesign --force --options runtime --sign - "$f" || true
          done

          echo "Signing app bundle..."
          codesign --force --deep --options runtime --entitlements macos-entitlements.plist --sign - "$APP_BUNDLE" || true

          echo "Verifying signature..."
          codesign --verify --deep --strict "$APP_BUNDLE" || true
          spctl --assess --type execute "$APP_BUNDLE" || true

          echo "✅ macOS Linkage & Code Signing completed successfully!"

      - name: "🧪 Run pytest (smoke + unit)"
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
          QT_MEDIA_BACKEND: ffmpeg
        run: |
          # pytest と必要なプラグインをインストール
          python -m pip install pytest pytest-xdist

          # パッケージ化された実行ファイルが存在するか確認（デバッグ用）
          echo "Checking dist/ contents:"
          ls -la dist/ || true

          # スモークテストを実行（失敗したら即座に停止）
          python -m pytest tests/ -v -m smoke --maxfail=1

      - name: 🍎 Optional notarize macOS app (recommended)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP_BUNDLE="dist/VO-SE_vocal_Mac.app"
          ZIP_PATH="dist_out/VO-SE_vocal_Mac_notarize.zip"
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "Skip notarization: secrets not set"
            exit 0
          fi
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "Skip notarization: app bundle not found"
            exit 0
          fi
          ditto -c -k --keepParent "$APP_BUNDLE" "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_BUNDLE"
          spctl --assess --type execute "$APP_BUNDLE"

      - name: 💿 Package signed macOS artifacts
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ matrix.os }}" = "macos-15-intel" ]; then
            MAC_LABEL="Intel"
          else
            MAC_LABEL="AppleSilicon"
          fi

          APP_BUNDLE="dist/VO-SE_vocal_Mac.app"
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "Error: app bundle not found at $APP_BUNDLE"
            exit 1
          fi

          mkdir -p dist_out
          echo "🍺 Installing create-dmg..."
          brew install create-dmg

          echo "💿 Generating signed DMG..."
          create-dmg \
            --volname "VO-SE vocal" \
            --background "assets/dmg_bg.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "VO-SE_vocal_Mac.app" 150 185 \
            --app-drop-link 450 185 \
            "dist_out/VO-SE_vocal_Mac_${MAC_LABEL}.dmg" \
            "dist/"

          echo "🗜️ Generating signed update ZIP..."
          (cd dist && zip -ry "../dist_out/VO-SE_vocal_Mac_${MAC_LABEL}_update.zip" VO-SE_vocal_Mac.app)

      - name: 🐧 Package Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/VO-SE_vocal_Linux
          mkdir -p dist_out
          chmod +x dist/VO-SE_vocal_Linux
          tar -C dist -czf dist_out/VO-SE_vocal_Linux_x86_64.tar.gz VO-SE_vocal_Linux
          cp dist/VO-SE_vocal_Linux dist_out/VO-SE_vocal_Linux_x86_64

      - name: 📦 Save Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VO-SE-vocal-Package-${{ matrix.os }}
          path: dist_out/

  # =============================================================================
  # 2. JUCEプラグイン ビルド + コード署名/公証
  # =============================================================================
  build-juce-plugin:
    name: Build JUCE Plugin for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-15-intel, macos-15, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Linux JUCE build dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev \
            libcurl4-openssl-dev libfreetype6-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev

      - name: 🛠️ Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache JUCE FetchContent
        uses: actions/cache@v4
        with:
          path: juce_plugin/build/_deps
          key: juce-fetchcontent-${{ runner.os }}-7.0.12

      - name: CMake を最新化
        uses: jwlawson/actions-setup-cmake@v2
        with:
            cmake-version: '3.31.x'

      - name: Configure (CMake)
        shell: bash
        run: |
            set -euo pipefail
            
            if [ "${{ matrix.os }}" = "windows-latest" ]; then
                # Windows用: Visual Studio 17 2022 と 64bitアーキテクチャ指定
                cmake -B juce_plugin/build -S juce_plugin \
                    -G "Visual Studio 17 2022" -A x64 \
                    -DCMAKE_BUILD_TYPE=Release \
                    --fresh
            elif [ "${{ matrix.os }}" = "macos-15-intel" ]; then
                # macOS Intel用
                cmake -B juce_plugin/build -S juce_plugin \
                    -G "Unix Makefiles" \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_OSX_ARCHITECTURES=x86_64 \
                    --fresh
            elif [ "${{ matrix.os }}" = "macos-15" ]; then
                # macOS Apple Silicon用
                cmake -B juce_plugin/build -S juce_plugin \
                    -G "Unix Makefiles" \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_OSX_ARCHITECTURES=arm64 \
                    --fresh
            else
                # Linux (ubuntu-latest) 等
                cmake -B juce_plugin/build -S juce_plugin \
                    -G "Unix Makefiles" \
                    -DCMAKE_BUILD_TYPE=Release \
                    --fresh
            fi
      - name: Build
        shell: bash
        run: |
          cmake --build juce_plugin/build --config Release --parallel

      - name: Generate macOS entitlements plist
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          cat > macos-entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.disable-library-validation</key>
            <true/>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
            <key>com.apple.security.device.audio-input</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: 🍎 Sign and Notarize JUCE Plugin (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          # プラグインバンドルのパスを特定
          PLUGIN_BUNDLE=""
          if [ "${{ matrix.os }}" = "macos-15-intel" ]; then
            MAC_ARCH="x86_64"
            MAC_LABEL="Intel"
          else
            MAC_ARCH="arm64"
            MAC_LABEL="AppleSilicon"
          fi

          # VST3パッケージを探す（AU/Standaloneも同じ手順）
          PLUGIN_BUNDLE=$(find juce_plugin/build -name "VoseVocal.vst3" -type d | head -1)
          if [ -z "$PLUGIN_BUNDLE" ]; then
            echo "Warning: VST3 bundle not found, trying AU..."
            PLUGIN_BUNDLE=$(find juce_plugin/build -name "VoseVocal.component" -type d | head -1)
          fi

          if [ -z "$PLUGIN_BUNDLE" ]; then
            echo "Warning: No plugin bundles found, skipping signing"
            exit 0
          fi

          echo "Found plugin bundle: $PLUGIN_BUNDLE"

          # 個別バイナリにコード署名
          echo "Signing individual binaries..."
          find "$PLUGIN_BUNDLE" -type f \( -name "*.dylib" -o -name "VoseVocal" \) -print | while read -r f; do
            echo "Signing: $f"
            codesign --force --options runtime --entitlements macos-entitlements.plist --sign - "$f" || true
          done

          # プラグインバンドル全体に署名
          echo "Signing plugin bundle..."
          codesign --force --deep --options runtime --entitlements macos-entitlements.plist --sign - "$PLUGIN_BUNDLE" || true

          # 署名の確認
          echo "Verifying signature..."
          codesign --verify --deep --strict "$PLUGIN_BUNDLE" || true
          spctl --assess --type execute "$PLUGIN_BUNDLE" || true

          # 公証（notarization）— Secretsが設定されている場合のみ
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "Skipping notarization: secrets not set"
            exit 0
          fi

          echo "Notarizing plugin bundle..."
          NOTARIZE_ZIP="juce_plugin/build/VoseVocal_${MAC_LABEL}_notarize.zip"
          ditto -c -k --keepParent "$PLUGIN_BUNDLE" "$NOTARIZE_ZIP"

          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$PLUGIN_BUNDLE"
          spctl --assess --type execute "$PLUGIN_BUNDLE"
          echo "✅ Notarization completed"

      - name: 🔏 Sign JUCE Plugin (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          SIGNTOOL_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          SIGNTOOL_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}
        run: |
          set -euo pipefail
          
          # DLLが見つかるかチェック
          PLUGIN_DLL=$(find juce_plugin/build -name "VoseVocal*.dll" -type f | head -1)
          if [ -z "$PLUGIN_DLL" ]; then
            echo "Warning: No plugin DLLs found, skipping signing"
            exit 0
          fi

          # Secretsが設定されている場合のみ署名
          if [ -z "$SIGNTOOL_CERT" ] || [ -z "$SIGNTOOL_PASSWORD" ]; then
            echo "Skipping code signing: Windows signing secrets not set"
            exit 0
          fi

          echo "Signing Windows plugin DLL: $PLUGIN_DLL"
          # 注: signtoolのパスと引数は実際のセットアップに合わせて調整してください
          # signtool sign /f cert.pfx /p "$SIGNTOOL_PASSWORD" /t http://timestamp.server.com "$PLUGIN_DLL"
          echo "⚠️  Manual code signing required for Windows plugins"

      - name: Collect build outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p juce_dist_out
          ARTEFACTS_DIR="juce_plugin/build/VoseVocal_artefacts/Release"
          if [ -d "$ARTEFACTS_DIR" ]; then
            echo "Found artefacts:"
            find "$ARTEFACTS_DIR" -maxdepth 2
            cp -R "$ARTEFACTS_DIR"/* juce_dist_out/ || true
          else
            echo "Warning: artefacts directory not found at $ARTEFACTS_DIR"
            find juce_plugin/build -maxdepth 3 -iname "*vosevocal*" || true
          fi

      - name: 📦 Save JUCE Plugin Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VO-SE-vocal-JUCEPlugin-${{ matrix.os }}
          path: juce_dist_out/

  # =============================================================================
  # 3. JUCEプラグイン ユニットテスト + 基本検証
  # =============================================================================
  test-juce-plugin:
    name: Test JUCE Plugin (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-juce-plugin
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download plugin artifacts
        uses: actions/download-artifact@v4
        with:
          name: VO-SE-vocal-JUCEPlugin-${{ matrix.os }}
          path: ./plugin_artifacts

      - name: 🧪 Verify VST3 Structure (all platforms)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Verifying VST3 Plugin Structure ==="
          
          # VST3パッケージの基本構造をチェック
          VST3_FOUND=0
          for vst3 in $(find plugin_artifacts -name "*.vst3" -type d); do
            VST3_FOUND=1
            echo "Found VST3: $vst3"
            
            # macOS: .vst3/Contents/MacOS の確認
            if [ -d "$vst3/Contents/MacOS" ]; then
              ls -la "$vst3/Contents/MacOS" || true
              echo "✓ macOS VST3 structure OK"
            fi
            
            # Windows: .vst3/x64-Release の確認
            if [ -d "$vst3/x64-Release" ]; then
              ls -la "$vst3/x64-Release" || true
              echo "✓ Windows VST3 structure OK"
            fi
            
            # Linux: バイナリの確認
            if [ -f "$vst3/VoseVocal.so" ]; then
              file "$vst3/VoseVocal.so"
              echo "✓ Linux VST3 binary found"
            fi
          done
          
          if [ $VST3_FOUND -eq 0 ]; then
            echo "⚠️  Warning: No VST3 packages found"
          fi

      - name: 🧪 Verify AU Structure (macOS only)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Verifying AU Plugin Structure ==="
          
          AU_FOUND=0
          for au in $(find plugin_artifacts -name "*.component" -type d); do
            AU_FOUND=1
            echo "Found AU: $au"
            ls -la "$au/Contents/MacOS" || true
            echo "✓ AU structure OK"
          done
          
          if [ $AU_FOUND -eq 0 ]; then
            echo "⚠️  Warning: No AU packages found"
          fi

      - name: 🧪 Code Signature Check (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Checking Code Signatures ==="
          
          for bundle in $(find plugin_artifacts -name "*.vst3" -o -name "*.component" -o -name "*.app"); do
            if [ -d "$bundle" ]; then
              echo "Checking: $bundle"
              codesign --verify --deep --strict "$bundle" 2>&1 || echo "⚠️  Not signed or signature invalid"
              spctl --assess --type execute "$bundle" 2>&1 || echo "⚠️  Gatekeeper check failed"
            fi
          done

      - name: 🧪 Binary Architecture Check (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Checking Binary Architectures ==="
          
          for binary in $(find plugin_artifacts -type f -executable); do
            if file "$binary" | grep -q "Mach-O"; then
              echo "Binary: $binary"
              lipo -info "$binary"
            fi
          done

      - name: 🧪 Dependency Check (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Checking Dependencies ==="
          
          for so in $(find plugin_artifacts -name "*.so" -type f); do
            echo "Analyzing: $so"
            ldd "$so" 2>&1 | head -20 || true
          done

      - name: 🧪 Plugin Validation (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Checking Windows Plugin DLLs ==="
          
          for dll in $(find plugin_artifacts -name "VoseVocal*.dll" -type f); do
            echo "Found DLL: $dll"
            file "$dll"
          done

      - name: 📊 Artifact Size Report
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Artifact Size Report ==="
          du -sh plugin_artifacts/*
          du -sh plugin_artifacts

  # =============================================================================
  # 4. Linux GUI依存パッケージ確認
  # =============================================================================
  smoke-linux:
    name: Linux GUI dependency smoke test
    runs-on: ubuntu-latest
    needs: test-juce-plugin
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt || true
          python -m pip install Pillow PySide6 pytest || true

      - name: Run smoke tests
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -v -m smoke --maxfail=1 2>&1 || echo "Some tests may have failed"
